<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VexHack - Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #07070d; --surface: #12121e; --surface2: #1a1a2e;
      --text: #f0f0f5; --text-muted: #8a8aa0;
      --accent: #7850ff; --accent2: #a855f7;
      --border: #22223a; --border2: #2a2a45;
      --success: #22c55e; --error: #ef4444; --warning: #f59e0b;
      --radius: 16px; --radius-sm: 10px;
      --glass: rgba(18,18,30,0.85);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 40px;
      background: var(--glass); backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo img { height: 30px; width: auto; }
    .logo span {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .admin-badge {
      background: var(--warning); color: #000; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .nav-links { display: flex; gap: 8px; list-style: none; align-items: center; }
    .nav-links a, .nav-links .nav-btn {
      padding: 8px 18px; border-radius: var(--radius-sm);
      color: var(--text-muted); text-decoration: none;
      font-size: 14px; font-weight: 500; transition: all 0.25s;
      border: none; background: none; cursor: pointer;
    }
    .nav-links a:hover, .nav-links .nav-btn:hover { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--text); background: var(--surface2); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    header { padding: 100px 40px 20px; }
    h1 { font-size: 30px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 24px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 40px 40px; }
    .stats { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px; text-align: center;
      flex: 1; min-width: 120px;
    }
    .stat-number { font-size: 26px; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; flex-wrap: wrap; }
    .tab {
      padding: 10px 22px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all 0.25s;
    }
    .tab:hover, .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .card-title { font-size: 18px; font-weight: 700; }
    .btn {
      padding: 9px 18px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.25s; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      text-decoration: none; display: inline-block;
    }
    .btn:hover { border-color: var(--accent); }
    .btn-success { background: var(--success); border-color: var(--success); color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: var(--error); border-color: var(--error); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-accent:hover { background: #6b4ce6; }
    .btn-edit { background: #3b82f6; border-color: #3b82f6; color: white; }
    .btn-edit:hover { background: #2563eb; }
    .pending-grid { display: grid; gap: 18px; }
    .pending-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
    .pending-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .pending-user { font-size: 17px; font-weight: 700; }
    .pending-date { color: var(--text-muted); font-size: 13px; }
    .pending-screenshots { display: flex; gap: 14px; margin: 14px 0; }
    .screenshot-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; flex: 1; }
    .screenshot-box .label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .screenshot-box img { width: 100%; border-radius: 6px; max-height: 180px; object-fit: contain; }
    .pending-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .plugins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
    .plugin-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: all 0.3s; }
    .plugin-card:hover { border-color: var(--accent); }
    .plugin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .plugin-name { font-size: 17px; font-weight: 700; }
    .plugin-code { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .plugin-desc { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin: 8px 0; }
    .plugin-link { color: var(--accent); font-size: 11px; word-break: break-all; }
    .plugin-actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .user-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 16px; text-align: center; position: relative;
    }
    .user-name { font-weight: 600; font-size: 14px; }
    .user-date { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .user-delete {
      position: absolute; top: 8px; right: 8px;
      background: var(--error); color: white; border: none;
      border-radius: 50%; width: 24px; height: 24px;
      cursor: pointer; font-size: 12px; line-height: 24px;
    }
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); z-index: 2000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      max-width: 480px; width: 100%;
    }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .modal-close { float: right; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
    input, textarea {
      width: 100%; padding: 12px 16px; background: var(--bg);
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      color: white; font-size: 14px; margin-bottom: 14px; font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .empty { text-align: center; padding: 40px; color: var(--text-muted); background: var(--surface2); border-radius: var(--radius); }
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 14px 24px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; color: white;
      transform: translateY(80px); opacity: 0;
      transition: all 0.4s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--error); }
    .toast.info { background: var(--accent); }
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .hamburger { display: flex; }
      .nav-links {
        display: none; position: fixed; top: 60px; left: 0; right: 0;
        flex-direction: column; padding: 16px; gap: 4px;
        background: var(--glass); backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
      }
      .nav-links.open { display: flex; }
      .nav-links a, .nav-links .nav-btn { width: 100%; text-align: center; padding: 12px; }
      header { padding: 80px 20px 20px; }
      .container { padding: 0 20px 20px; }
      .pending-screenshots { flex-direction: column; }
      .plugins-grid { grid-template-columns: 1fr; }
      .stats { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <nav>
    <a href="/" class="logo"><img src="logo.png" alt="VexHack"><span>VexHack</span> <span class="admin-badge">ADMIN</span></a>
    <div class="nav-links" id="navLinks">
      <a href="/">Strona główna</a>
      <a href="#" class="active" onclick="showSection('pending')">Oczekujący</a>
      <a href="#" onclick="showSection('plugins')">Projekty</a>
      <a href="#" onclick="showSection('users')">Użytkownicy</a>
      <button class="nav-btn" onclick="logout()">Wyloguj</button>
    </div>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <header>
    <h1>Panel admina</h1>
    <p class="subtitle">Zarządzaj użytkownikami i projektami</p>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Oczekujących</div></div>
      <div class="stat-card"><div class="stat-number" id="usersCount">0</div><div class="stat-label">Użytkowników</div></div>
      <div class="stat-card"><div class="stat-number" id="pluginsCount">0</div><div class="stat-label">Projektów</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showSection('pending')">📋 Oczekujący</button>
      <button class="tab" onclick="showSection('plugins')">📦 Projekty</button>
      <button class="tab" onclick="showSection('users')">👥 Użytkownicy</button>
    </div>

    <div id="pendingSection" class="section active">
      <div class="card">
        <div class="card-header"><span class="card-title">📋 Oczekujące rejestracje</span></div>
        <div class="pending-grid" id="pendingGrid"></div>
      </div>
    </div>

    <div id="pluginsSection" class="section">
      <div class="card">
        <div class="card-header">
          <span class="card-title">📦 Zarządzanie projektami</span>
          <button class="btn btn-accent" onclick="openAddPluginModal()">➕ Dodaj</button>
        </div>
        <div class="plugins-grid" id="pluginsGrid"></div>
      </div>
    </div>

    <div id="usersSection" class="section">
      <div class="card">
        <div class="card-header"><span class="card-title">👥 Zatwierdzeni użytkownicy</span></div>
        <div class="users-grid" id="usersGrid"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="pluginModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closePluginModal()">&times;</button>
      <div class="modal-title" id="modalTitle">➕ Dodaj projekt</div>
      <input type="hidden" id="editPluginId">
      <label style="display:block;text-align:left;color:var(--text-muted);font-size:13px;margin-bottom:4px;">Nazwa</label>
      <input type="text" id="pluginName" placeholder="Nazwa projektu">
      <label style="display:block;text-align:left;color:var(--text-muted);font-size:13px;margin-bottom:4px;">Opis</label>
      <textarea id="pluginDescription" placeholder="Opis..."></textarea>
      <label style="display:block;text-align:left;color:var(--text-muted);font-size:13px;margin-bottom:4px;">Link do pobrania</label>
      <input type="text" id="pluginLink" placeholder="https://...">
      <label style="display:block;text-align:left;color:var(--text-muted);font-size:13px;margin-bottom:4px;">Kod (opcjonalnie)</label>
      <input type="text" id="pluginCode" placeholder="Kod">
      <div class="modal-actions">
        <button class="btn btn-accent" onclick="savePlugin()">💾 Zapisz</button>
        <button class="btn" onclick="closePluginModal()">Anuluj</button>
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('hamburger').classList.toggle('open');
      document.getElementById('navLinks').classList.toggle('open');
    }
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => {
        document.getElementById('hamburger').classList.remove('open');
        document.getElementById('navLinks').classList.remove('open');
      });
    });
    const API_URL = '/api';
    const ADMIN_PASS = '121koko9a';

    function toast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function checkAuth() {
      const user = JSON.parse(localStorage.getItem('vexpanel_user') || '{}');
      if (!user.token || !user.isAdmin) { window.location.href = 'login.html'; return; }
      loadAll();
    }

    function logout() { localStorage.removeItem('vexpanel_user'); window.location.href = 'login.html'; }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(section + 'Section').classList.add('active');
      event.target.classList.add('active');
    }

    async function loadAll() { await loadPending(); await loadPlugins(); await loadUsers(); }

    async function loadPending() {
      try {
        const res = await fetch(API_URL + '/pending');
        const pending = await res.json();
        document.getElementById('pendingCount').textContent = pending.length;
        const grid = document.getElementById('pendingGrid');
        if (pending.length === 0) { grid.innerHTML = '<div class="empty">🎉 Brak oczekujących rejestracji!</div>'; return; }
        grid.innerHTML = pending.map(u => `
          <div class="pending-card">
            <div class="pending-header">
              <span class="pending-user">👤 ${u.username}</span>
              <span class="pending-date">${new Date(u.createdAt).toLocaleString('pl-PL')}</span>
            </div>
            <div class="pending-screenshots">
              <div class="screenshot-box"><div class="label">📷 Screenshot #1</div><img src="${u.screenshots[0] || ''}" onerror="this.style.display='none'"></div>
              <div class="screenshot-box"><div class="label">📷 Screenshot #2</div><img src="${u.screenshots[1] || ''}" onerror="this.style.display='none'"></div>
            </div>
            <div class="pending-actions">
              <button class="btn btn-success" onclick="approveUser(${u.id})">✅ Akceptuj</button>
              <button class="btn btn-danger" onclick="rejectUser(${u.id})">❌ Odrzuć</button>
            </div>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    async function loadPlugins() {
      try {
        const res = await fetch(API_URL + '/plugins');
        const plugins = await res.json();
        document.getElementById('pluginsCount').textContent = plugins.length;
        const grid = document.getElementById('pluginsGrid');
        if (plugins.length === 0) { grid.innerHTML = '<div class="empty">Brak projektów. Dodaj pierwszy!</div>'; return; }
        grid.innerHTML = plugins.map(p => `
          <div class="plugin-card">
            <div class="plugin-header">
              <span class="plugin-name">${p.name}</span>
              <span class="plugin-code">${p.code || 'N/A'}</span>
            </div>
            <p class="plugin-desc">${p.description || ''}</p>
            <div class="plugin-link">🔗 ${p.link || 'Brak linku'}</div>
            <div class="plugin-actions">
              <button class="btn btn-edit" onclick="editPlugin('${p.id}')">✏️ Edytuj</button>
              <button class="btn btn-danger" onclick="deletePlugin('${p.id}')">🗑️ Usuń</button>
            </div>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    async function loadUsers() {
      try {
        const res = await fetch(API_URL + '/users');
        const users = await res.json();
        document.getElementById('usersCount').textContent = users.length;
        const grid = document.getElementById('usersGrid');
        if (users.length === 0) { grid.innerHTML = '<div class="empty">Brak zatwierdzonych użytkowników</div>'; return; }
        grid.innerHTML = users.map(u => `
          <div class="user-card">
            <button class="user-delete" onclick="deleteUser(${u.id})">&times;</button>
            <div class="user-name">👤 ${u.username}</div>
            <div class="user-date">Od: ${new Date(u.approvedAt).toLocaleDateString('pl-PL')}</div>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    async function approveUser(userId) {
      try {
        const res = await fetch(API_URL + '/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, adminPassword: ADMIN_PASS }) });
        const data = await res.json();
        if (data.success) { toast('✅ Użytkownik zatwierdzony!', 'success'); loadAll(); }
        else { toast('❌ ' + data.error, 'error'); }
      } catch { toast('❌ Błąd połączenia!', 'error'); }
    }

    async function rejectUser(userId) {
      if (!confirm('Na pewno odrzucić tego użytkownika?')) return;
      try {
        const res = await fetch(API_URL + '/reject', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, adminPassword: ADMIN_PASS }) });
        const data = await res.json();
        if (data.success) { toast('❌ Użytkownik odrzucony', 'error'); loadAll(); }
      } catch { toast('❌ Błąd połączenia!', 'error'); }
    }

    async function deleteUser(userId) {
      if (!confirm('Na pewno usunąć tego użytkownika?')) return;
      try {
        const res = await fetch(API_URL + '/users/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, adminPassword: ADMIN_PASS }) });
        const data = await res.json();
        if (data.success) { toast('✅ Użytkownik usunięty!', 'success'); loadAll(); }
      } catch { toast('❌ Błąd połączenia!', 'error'); }
    }

    function openAddPluginModal() {
      document.getElementById('modalTitle').textContent = '➕ Dodaj projekt';
      document.getElementById('editPluginId').value = '';
      document.getElementById('pluginName').value = '';
      document.getElementById('pluginDescription').value = '';
      document.getElementById('pluginLink').value = '';
      document.getElementById('pluginCode').value = '';
      document.getElementById('pluginModal').classList.add('show');
    }

    function editPlugin(pluginId) {
      fetch(API_URL + '/plugins').then(r => r.json()).then(plugins => {
        const p = plugins.find(p => p.id === pluginId);
        if (p) {
          document.getElementById('modalTitle').textContent = '✏️ Edytuj projekt';
          document.getElementById('editPluginId').value = p.id;
          document.getElementById('pluginName').value = p.name;
          document.getElementById('pluginDescription').value = p.description || '';
          document.getElementById('pluginLink').value = p.link || '';
          document.getElementById('pluginCode').value = p.code || '';
          document.getElementById('pluginModal').classList.add('show');
        }
      });
    }

    function closePluginModal() { document.getElementById('pluginModal').classList.remove('show'); }

    async function savePlugin() {
      const editId = document.getElementById('editPluginId').value;
      const name = document.getElementById('pluginName').value.trim();
      const description = document.getElementById('pluginDescription').value.trim();
      const link = document.getElementById('pluginLink').value.trim();
      const code = document.getElementById('pluginCode').value.trim();
      if (!name) { toast('Nazwa jest wymagana!', 'error'); return; }
      try {
        const url = editId ? API_URL + '/plugins/update' : API_URL + '/plugins/add';
        const body = { adminPassword: ADMIN_PASS, name, description, link, code };
        if (editId) body.pluginId = editId;
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        if (data.success) { toast('✅ ' + data.message, 'success'); closePluginModal(); loadPlugins(); }
        else { toast('❌ ' + data.error, 'error'); }
      } catch { toast('❌ Błąd połączenia!', 'error'); }
    }

    async function deletePlugin(pluginId) {
      if (!confirm('Na pewno usunąć ten projekt?')) return;
      try {
        const res = await fetch(API_URL + '/plugins/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pluginId, adminPassword: ADMIN_PASS }) });
        const data = await res.json();
        if (data.success) { toast('✅ Projekt usunięty!', 'success'); loadPlugins(); }
      } catch { toast('❌ Błąd połączenia!', 'error'); }
    }

    checkAuth();
  </script>
</body>
</html>
