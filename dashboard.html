<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VexHack - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #07070d; --surface: #12121e; --surface2: #1a1a2e;
      --text: #f0f0f5; --text-muted: #8a8aa0;
      --accent: #7850ff; --accent2: #a855f7;
      --border: #22223a; --border2: #2a2a45;
      --success: #22c55e; --error: #ef4444;
      --radius: 16px; --radius-sm: 10px;
      --glass: rgba(18,18,30,0.85);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 40px;
      background: var(--glass); backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo img { height: 30px; width: auto; }
    .logo span {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 8px; list-style: none; align-items: center; }
    .nav-links a, .nav-links .nav-btn {
      padding: 8px 18px; border-radius: var(--radius-sm);
      color: var(--text-muted); text-decoration: none;
      font-size: 14px; font-weight: 500; transition: all 0.25s;
      border: none; background: none; cursor: pointer;
    }
    .nav-links a:hover, .nav-links .nav-btn:hover { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--text); background: var(--surface2); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    header { padding: 110px 40px 30px; }
    h1 {
      font-size: 32px; font-weight: 700; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: var(--text-muted); margin-bottom: 28px; font-size: 15px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 40px 40px; }
    .stats { display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px 28px; min-width: 160px;
      flex: 1; transition: border-color 0.3s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-number { font-size: 30px; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
    .section-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      transition: all 0.3s;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(120,80,255,0.1); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .card-name { font-size: 17px; font-weight: 700; }
    .card-code {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; padding: 3px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .card-desc { color: var(--text-muted); font-size: 13px; line-height: 1.7; margin-bottom: 14px; white-space: pre-line; }
    .card-download {
      display: inline-block; padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; text-decoration: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; transition: all 0.3s;
    }
    .card-download:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(120,80,255,0.35); }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .hamburger { display: flex; }
      .nav-links {
        display: none; position: fixed; top: 60px; left: 0; right: 0;
        flex-direction: column; padding: 16px; gap: 4px;
        background: var(--glass); backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
      }
      .nav-links.open { display: flex; }
      .nav-links a, .nav-links .nav-btn { width: 100%; text-align: center; padding: 12px; }
      header { padding: 90px 20px 20px; }
      .container { padding: 0 20px 20px; }
      .grid { grid-template-columns: 1fr; }
      .stats { flex-direction: column; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo"><img src="logo.png" alt="VexHack"><span>VexHack</span></a>
    <div class="nav-links" id="navLinks">
      <a href="/">Strona główna</a>
      <a href="#" class="active">Projekty</a>
      <span id="usernameDisplay" style="color:var(--text-muted);font-size:13px;padding:0 8px;"></span>
      <button class="nav-btn" onclick="logout()">Wyloguj</button>
    </div>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <header>
    <h1>Panel projektów</h1>
    <p class="subtitle">Witaj w panelu! Tutaj znajdziesz wszystkie nasze pluginy, skrypty i programy.</p>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="pluginCount">0</div>
        <div class="stat-label">Projektów</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">VexHack</div>
        <div class="stat-label">Team</div>
      </div>
    </div>

    <h2 class="section-title">📦 Wszystkie projekty</h2>
    <div class="grid" id="pluginsGrid"></div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('hamburger').classList.toggle('open');
      document.getElementById('navLinks').classList.toggle('open');
    }
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => {
        document.getElementById('hamburger').classList.remove('open');
        document.getElementById('navLinks').classList.remove('open');
      });
    });
    function checkAuth() {
      const user = JSON.parse(localStorage.getItem('vexpanel_user') || '{}');
      if (!user.token) { window.location.href = 'login.html'; return; }
      document.getElementById('usernameDisplay').textContent = user.username || '';
      loadPlugins();
    }
    function logout() { localStorage.removeItem('vexpanel_user'); window.location.href = 'login.html'; }
    async function loadPlugins() {
      try {
        const res = await fetch('/api/plugins');
        const plugins = await res.json();
        document.getElementById('pluginCount').textContent = plugins.length;
        const grid = document.getElementById('pluginsGrid');
        if (plugins.length === 0) {
          grid.innerHTML = '<div class="empty">Brak projektów do wyświetlenia.</div>';
          return;
        }
        grid.innerHTML = plugins.map(p => `
          <div class="card">
            <div class="card-header">
              <span class="card-name">${p.name}</span>
              <span class="card-code">${p.code || ''}</span>
            </div>
            <p class="card-desc">${p.description || ''}</p>
            <a href="${p.link || '#'}" class="card-download" target="_blank" ${!p.link ? 'style="pointer-events:none;opacity:0.5"' : ''}>⬇️ Pobierz</a>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }
    checkAuth();
  </script>
</body>
</html>
