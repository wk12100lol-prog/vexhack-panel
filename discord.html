<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VexHack - Połącz z Discord</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0a0f; --surface:#1a1a25; --text:#fff; --text-muted:#a0a0b0; --accent:#7850ff; --success:#22c55e; --error:#ef4444; --border:#2a2a3a; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .container { max-width:450px; width:100%; background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:40px; text-align:center; }
    .logo { font-size:32px; font-weight:800; background:linear-gradient(135deg,#7850ff,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; }
    h1 { font-size:22px; margin-bottom:10px; }
    p { color:var(--text-muted); margin-bottom:25px; line-height:1.6; font-size:14px; }
    .icon { font-size:60px; margin-bottom:15px; }
    .steps { text-align:left; margin-bottom:25px; }
    .step { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; padding:12px; background:rgba(120,80,255,0.08); border-radius:10px; }
    .step-num { background:var(--accent); color:white; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .step-text { font-size:14px; color:var(--text-muted); }
    .step-text strong { color:var(--text); }
    .step-text code { background:rgba(120,80,255,0.2); padding:2px 8px; border-radius:6px; color:white; font-weight:700; }
    input { width:100%; padding:16px; background:var(--bg); border:2px solid var(--border); border-radius:12px; color:white; font-size:18px; text-align:center; transition:border-color 0.3s; margin-bottom:12px; }
    input:focus { outline:none; border-color:var(--accent); }
    input::placeholder { color:var(--text-muted); font-size:14px; letter-spacing:normal; }
    #codeInput { font-size:22px; font-family:monospace; letter-spacing:6px; }
    button { width:100%; padding:16px; background:linear-gradient(135deg,#5865F2,#4752C4); border:none; border-radius:12px; color:white; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s; margin-top:4px; }
    button:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(88,101,242,0.4); }
    button:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .message { padding:14px; border-radius:10px; margin-top:12px; font-size:14px; display:none; }
    .message.success { background:rgba(34,197,94,0.15); border:1px solid var(--success); color:var(--success); }
    .message.error { background:rgba(239,68,68,0.15); border:1px solid var(--error); color:var(--error); }
    .step-input { display:none; }
    .link { margin-top:20px; color:var(--text-muted); font-size:14px; }
    .link a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💬</div>
    <div class="logo">VexHack</div>
    <h1>Połącz z Discord</h1>
    <p>Masz rolę na serwerze VexHack? Użyj kodu z Discorda!</p>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Na Discordzie wpisz <code>!połącz</code></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Bot wyśle Ci <strong>6-cyfrowy kod</strong></div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Wpisz kod i <strong>ustaw hasło</strong> do logowania</div>
      </div>
    </div>

    <input type="text" id="codeInput" placeholder="Kod z Discorda" maxlength="6" autocomplete="off">
    <div class="step-input" id="passwordStep">
      <input type="password" id="passInput" placeholder="Ustaw hasło do konta">
      <input type="password" id="passInput2" placeholder="Powtórz hasło">
    </div>
    <button id="verifyBtn" onclick="verifyCode()">🔐 Zweryfikuj</button>
    <div class="message" id="message"></div>

    <div class="link">
      Masz już konto? <a href="login.html">Zaloguj się</a>
    </div>
  </div>

  <script>
    let codeVerified = false;
    let discordData = null;

    async function verifyCode() {
      const code = document.getElementById('codeInput').value.trim();
      const pass = document.getElementById('passInput').value;
      const pass2 = document.getElementById('passInput2').value;
      const btn = document.getElementById('verifyBtn');
      const msg = document.getElementById('message');

      if (!codeVerified) {
        if (code.length !== 6 || !/^\d+$/.test(code)) {
          msg.className = 'message error';
          msg.textContent = 'Kod musi mieć 6 cyfr!';
          msg.style.display = 'block';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Sprawdzanie kodu...';
        msg.style.display = 'none';

        try {
          const res = await fetch('/api/discord/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code }) });
          const data = await res.json();
          if (data.success) {
            codeVerified = true;
            discordData = data;
            document.getElementById('codeInput').style.display = 'none';
            document.getElementById('passwordStep').style.display = 'block';
            btn.textContent = '🔐 Ustaw hasło i połącz';
            btn.style.background = 'linear-gradient(135deg,#7850ff,#a855f7)';
            msg.className = 'message success';
            msg.textContent = '✅ Kod poprawny! Teraz ustaw hasło.';
            msg.style.display = 'block';
            btn.disabled = false;
          } else {
            msg.className = 'message error';
            msg.textContent = '❌ ' + (data.error || 'Nieprawidłowy kod!');
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '🔐 Zweryfikuj';
          }
        } catch (e) {
          msg.className = 'message error';
          msg.textContent = '❌ Błąd połączenia!';
          msg.style.display = 'block';
          btn.disabled = false;
        }
      } else {
        if (!pass || pass.length < 4) {
          msg.className = 'message error';
          msg.textContent = 'Hasło musi mieć min. 4 znaki!';
          msg.style.display = 'block';
          return;
        }
        if (pass !== pass2) {
          msg.className = 'message error';
          msg.textContent = 'Hasła nie są identyczne!';
          msg.style.display = 'block';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Zapisywanie...';

        try {
          const res = await fetch('/api/discord/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: document.getElementById('codeInput').value, password: pass }) });
          const data = await res.json();
          if (data.success) {
            localStorage.setItem('vexpanel_user', JSON.stringify({ isAdmin: false, discordId: data.discordId, username: data.discordUsername, token: 'user_' + Date.now() }));
            msg.className = 'message success';
            msg.textContent = '✅ Konto utworzone! Możesz się logować.';
            msg.style.display = 'block';
            btn.textContent = '✅ Gotowe!';
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
          } else {
            msg.className = 'message error';
            msg.textContent = '❌ ' + (data.error || 'Błąd!');
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '🔐 Ustaw hasło i połącz';
          }
        } catch (e) {
          msg.className = 'message error';
          msg.textContent = '❌ Błąd połączenia!';
          msg.style.display = 'block';
          btn.disabled = false;
        }
      }
    }

    document.getElementById('codeInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') verifyCode(); });
    document.getElementById('passInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') verifyCode(); });
    document.getElementById('passInput2').addEventListener('keypress', function(e) { if (e.key === 'Enter') verifyCode(); });
  </script>
</body>
</html>
