<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VexHack - Logowanie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #07070d; --surface: #12121e; --surface2: #1a1a2e;
      --text: #f0f0f5; --text-muted: #8a8aa0;
      --accent: #7850ff; --accent2: #a855f7;
      --border: #22223a;
      --success: #22c55e; --error: #ef4444;
      --radius: 16px; --radius-sm: 10px;
      --glass: rgba(18,18,30,0.85);
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 40px;
      background: var(--glass); backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo img { height: 36px; width: auto; border-radius: 10px; }
    .logo span {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 8px; list-style: none; align-items: center; }
    .nav-links a {
      padding: 8px 18px; border-radius: var(--radius-sm);
      color: var(--text-muted); text-decoration: none;
      font-size: 14px; font-weight: 500; transition: all 0.25s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface2); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .center {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 100px 20px 40px;
    }
    .card {
      max-width: 420px; width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px; text-align: center;
    }
    .card-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 4px; }
    .card-logo img { height: 48px; width: auto; border-radius: 12px; filter: drop-shadow(0 0 20px rgba(120,80,255,0.25)); }
    .card-logo span {
      font-size: 34px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    h1 { font-size: 20px; margin-bottom: 28px; color: var(--text-muted); font-weight: 600; }
    input {
      width: 100%; padding: 14px 18px;
      background: var(--bg); border: 2px solid var(--border);
      border-radius: var(--radius-sm); color: white; font-size: 15px;
      margin-bottom: 14px; transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius-sm);
      color: white; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(120,80,255,0.35); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .message {
      padding: 12px 16px; border-radius: var(--radius-sm);
      margin-top: 14px; font-size: 14px; display: none;
    }
    .message.success { background: rgba(34,197,94,0.12); border: 1px solid var(--success); color: var(--success); }
    .message.error { background: rgba(239,68,68,0.12); border: 1px solid var(--error); color: var(--error); }
    .link { margin-top: 20px; color: var(--text-muted); font-size: 14px; }
    .link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .link a:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .hamburger { display: flex; }
      .nav-links {
        display: none; position: fixed; top: 60px; left: 0; right: 0;
        flex-direction: column; padding: 16px; gap: 4px;
        background: var(--glass); backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
      }
      .nav-links.open { display: flex; }
      .nav-links a { width: 100%; text-align: center; padding: 12px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo"><img src="logo.png" alt="VexHack"><span>VexHack</span></a>
    <div class="nav-links" id="navLinks">
      <a href="/">Strona główna</a>
      <a href="register.html">Rejestracja</a>
    </div>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="center">
    <div class="card">
      <div class="card-logo"><img src="logo.png" alt="VexHack"><span>VexHack</span></div>
      <h1>Zaloguj się do panelu</h1>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Nazwa użytkownika" required>
        <input type="password" id="password" placeholder="Hasło" required>
        <button type="submit" id="loginBtn">Zaloguj się</button>
        <div class="message" id="message"></div>
      </form>
      <div class="link">Nie masz konta? <a href="register.html">Zarejestruj się</a></div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('hamburger').classList.toggle('open');
      document.getElementById('navLinks').classList.toggle('open');
    }
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => {
        document.getElementById('hamburger').classList.remove('open');
        document.getElementById('navLinks').classList.remove('open');
      });
    });
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('message');
      msg.className = 'message'; msg.textContent = 'Logowanie...'; msg.style.display = 'block';
      btn.disabled = true; btn.textContent = 'Logowanie...';
      try {
        const res = await fetch(`/api/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('vexpanel_user', JSON.stringify(data));
          msg.className = 'message success';
          msg.textContent = '✅ Zalogowano! Przekierowanie...';
          setTimeout(() => { window.location.href = data.isAdmin ? 'admin.html' : 'dashboard.html'; }, 800);
        } else {
          msg.className = 'message error'; msg.textContent = '❌ ' + (data.error || 'Błąd logowania');
          btn.disabled = false; btn.textContent = 'Zaloguj się';
        }
      } catch {
        msg.className = 'message error'; msg.textContent = '❌ Błąd połączenia z serwerem';
        btn.disabled = false; btn.textContent = 'Zaloguj się';
      }
    });
  </script>
</body>
</html>
